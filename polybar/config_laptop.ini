[colors]
primary = #245b97
secondary = #bc9ed0
tertiary = #f08533
fourth = #cfb793
fifth = #9fd356
white = #ffffff

[bar/top]
background = ${colors.primary}
foreground = ${colors.white}
font-0 = "MonaspiceAr Nerd Font Mono:size=11:weight=bold"
modules-right = bspwm battery pulseaudio date
modules-left = tray xwindow
padding = 2
height = 32
module-margin-left = 1
module-margin-right = 1

[module/bluetooth-battery]
type = custom/script
exec = ~/.config/polybar/scripts/batteryremaining.sh
interval = 10
label = %output%
format-background = ${colors.primary}
format-foreground = ${colors.white}

[module/proton-status]
type = custom/script
exec = ~/.config/polybar/scripts/proton-status.sh
interval = 15
label = %output%
format-background = ${colors.primary}
format-foreground = ${colors.white}
click-left = ~/.config/polybar/scripts/toggle-proton.sh


[module/date]
type = internal/date
date = %Y-%m-%d %H:%M:%S

[module/tray]
type = internal/tray

[module/battery]
type = internal/battery
label-charging =  Charging %percentage%%
label-discharging =  %percentage%%

[module/xwindow]
type = internal/xwindow
format = <label>
format-background = ${colors.primary}
format-foreground = ${colors.white}
format-padding = 2
label = %title%
label-maxlen = 50
label-empty = Desktop
label-empty-foreground = ${colors.fourth}

[module/bspwm]
type = internal/bspwm
pin-workspaces = false
enable-click = true
label-focused = %name%
label-focused-background = ${colors.secondary}
label-focused-underline = ${colors.tertiary}
label-focused-padding = 1

label-occupied = %name%
label-occupied-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.tertiary}
label-urgent-padding = 1

label-empty = %name%
label-empty-foreground = ${colors.fourth}
label-empty-padding = 1

[module/pulseaudio]
type = internal/pulseaudio
use-ui-max = true
interval = 5
format-volume = <label-volume> <bar-volume>
label-muted = muted
click-right = pavucontrol

bar-volume-width = 10
bar-volume-foreground-0 = ${colors.secondary}
bar-volume-foreground-1 = ${colors.secondary}
bar-volume-foreground-2 = ${colors.fifth}
bar-volume-foreground-3 = ${colors.fifth}
bar-volume-foreground-4 = ${colors.tertiary}
bar-volume-gradient = true
bar-volume-indicator = |
bar-volume-fill = —
bar-volume-fill-font = 2
bar-volume-empty = -
bar-volume-empty-font = 2
bar-volume-empty-foreground = ${colors.fourth}

[colors]
primary = #245b97
primary-darkened = #205083
secondary = #bc9ed0
tertiary = #f08533
fourth = #cfb793
fifth = #9fd356
white = #ffffff

[bar/top]
background = ${colors.primary}
foreground = ${colors.white}
font-0 = "MonaspiceAr Nerd Font Mono:size=11:weight=bold"
font-1 = "MonaspiceAr Nerd Font Mono:size=18:weight=bold;3"
font-2 = "MonaspiceAr Nerd Font Mono:size=14:weight=bold;2"
font-3 = "MonaspiceAr Nerd Font Mono:size=6"
modules-right = tray network bluetooth-battery battery pulseaudio date
modules-left = proton-status bspwm
modules-center = xwindow
underline-size = 2
padding = 2
height = 32
module-margin-left = 1
module-margin-right = 0
radius = 22

[module/network]
type = internal/network
interface-type = wired
interval = 3.0
label-connected = %{T3}ůįąÄ%{T1} %local_ip%
label-connected-underline = ${colors.secondary}
label-disconnected = %{T3}ůįąā%{T1} %{F#cfb793}Disconnected

[module/bluetooth-battery]
type = custom/script
exec = ~/.config/polybar/scripts/batteryremaining.sh
interval = 10
label = %output%
format-background = ${colors.primary}
format-foreground = ${colors.white}

[module/proton-status]
type = custom/script
exec = ~/.config/polybar/scripts/proton-status.sh
interval = 7
label = %output%
label-font = 2
format-background = ${colors.primary}
format-foreground = ${colors.white}
click-left = ~/.config/polybar/scripts/toggle-proton.sh


[module/date]
type = internal/date
date = %Y-%m-%d %H:%M:%S
label-underline = ${colors.secondary}

[module/tray]
type = internal/tray

[module/battery]
type = internal/battery
ramp-capacity-0 = ůįāÉ
ramp-capacity-1 = ůįĀļ
ramp-capacity-2 = ůįĀĽ
ramp-capacity-3 = ůįĀľ
ramp-capacity-4 = ůįĀĹ
ramp-capacity-5 = ůįĀĺ
ramp-capacity-6 = ůįĀŅ
ramp-capacity-7 = ůįāÄ
ramp-capacity-8 = ůįāĀ
ramp-capacity-9 = ůįāā

ramp-capacity-0-font = 2
ramp-capacity-1-font = 2
ramp-capacity-2-font = 2
ramp-capacity-3-font = 2
ramp-capacity-4-font = 2
ramp-capacity-5-font = 2
ramp-capacity-6-font = 2
ramp-capacity-7-font = 2
ramp-capacity-8-font = 2
ramp-capacity-9-font = 2

format-charging = <ramp-capacity>ÔÉß <label-charging>
format-discharging = <ramp-capacity> <label-discharging>
format-full = ůįĀĻ <label-full>

[module/xwindow]
type = internal/xwindow
format = <label>
format-background = ${colors.primary}
format-foreground = ${colors.white}
format-padding = 2
label = %title%
label-underline = ${colors.secondary}
label-maxlen = 25
label-empty = Desktop
label-empty-foreground = ${colors.fourth}

[module/bspwm]
type = internal/bspwm
pin-workspaces = false
enable-click = true
label-focused = "%{T4} %{T1}%name%%{T4} %{T1}"
label-focused-background = ${colors.primary-darkened}
label-focused-foreground = ${colors.secondary}
label-focused-underline = ${colors.secondary}

label-occupied = "%{T4} %{T1}%name%%{T4} %{T1}"

label-dimmed = "%{T4} %{T1}%name%%{T4} %{T1}"
label-dimmed-foreground = ${colors.fourth}


label-urgent = "%{T4} %{T1}%name%%{T4} %{T1}"
label-urgent-background = ${colors.tertiary}

label-empty = "%{T4} %{T1}%name%%{T4} %{T1}"
label-empty-foreground = ${colors.fifth}

[module/pulseaudio]
type = internal/pulseaudio
use-ui-max = false
interval = 5
ramp-volume-0 = %{T2}ůįēŅ%{T1}
ramp-volume-1 = %{T2}ůįĖÄ%{T1} 
ramp-volume-2 = %{T2}ůįēĺ%{T1}
format-volume = <ramp-volume> <label-volume>
label-muted = %{T2}ÓĽ®%{T1} muted
format-volume-underline = ${colors.secondary}
click-right = pavucontrol

bar-volume-width = 10
bar-volume-foreground-0 = ${colors.secondary}
bar-volume-foreground-1 = ${colors.secondary}
bar-volume-foreground-2 = ${colors.fifth}
bar-volume-foreground-3 = ${colors.fifth}
bar-volume-foreground-4 = ${colors.tertiary}
bar-volume-gradient = true
bar-volume-indicator = ‚ĒÉ
bar-volume-fill = ‚ĒĀ
bar-volume-fill-font = 1
bar-volume-empty = -
bar-volume-empty-font = 1
bar-volume-empty-foreground = ${colors.fourth}
